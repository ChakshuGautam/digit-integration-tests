name: e2e

# Manual-only for now — the manage-surface specs are still being
# stabilized and we don't want every PR to spin up a real browser
# against naipepea. Re-enable pull_request once tests are green
# locally and we've confirmed cleanup is solid.
on:
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Run
        env:
          BASE_URL: ${{ secrets.TEST_BASE_URL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: failure()
        with: { name: playwright-report, path: playwright-report/ }
